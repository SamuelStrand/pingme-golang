openapi: 3.0.3
info:
  title: PingMe API
  version: 0.1.0
servers:
  - url: http://localhost:8080

tags:
  - name: auth
  - name: user
  - name: alert-channels
  - name: telegram
  - name: targets
  - name: health

paths:
  /health:
    get:
      tags: [health]
      summary: Liveness probe
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  db: { type: string }

  /ready:
    get:
      tags: [health]
      summary: Readiness probe
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }

  /auth/register:
    post:
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthEmailPassword"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "409":
          description: Email already exists

  /auth/login:
    post:
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthEmailPassword"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "401":
          description: Invalid credentials

  /auth/refresh:
    post:
      tags: [auth]
      summary: Refresh tokens (rotation)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "401":
          description: Invalid refresh token

  /auth/logout:
    post:
      tags: [auth]
      summary: Logout (revoke refresh session)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "204":
          description: No Content

  /me:
    get:
      tags: [user]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /alert-channels:
    get:
      tags: [alert-channels]
      summary: List current user's alert channels
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AlertChannel"
        "401":
          description: Unauthorized
    post:
      tags: [alert-channels]
      summary: Create alert channel
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAlertChannelRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertChannel"
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "409":
          description: Already exists

  /alert-channels/{id}:
    patch:
      tags: [alert-channels]
      summary: Update alert channel
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAlertChannelRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertChannel"
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "404":
          description: Not found
        "409":
          description: Already exists
    delete:
      tags: [alert-channels]
      summary: Delete alert channel
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /telegram/link-token:
    post:
      tags: [telegram]
      summary: Create Telegram bot link token
      description: Returns a one-time deep link for connecting the current user's Telegram chat.
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelegramLinkTokenResponse"
        "401":
          description: Unauthorized
        "500":
          description: Telegram bot is not configured

  /targets:
    get:
      tags: [targets]
      summary: List current user's targets
      description: Returns the latest target status in the list response. A separate status endpoint is not required.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: page_size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TargetListResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [targets]
      summary: Create target
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTargetRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Target"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /targets/{id}:
    patch:
      tags: [targets]
      summary: Update target
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTargetRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Target"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [targets]
      summary: Delete target
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /targets/{id}/logs:
    get:
      tags: [targets]
      summary: List target check logs
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: page_size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: from
          description: Inclusive lower bound for checked_at in RFC3339 format. Fractional seconds are accepted.
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          description: Inclusive upper bound for checked_at in RFC3339 format. Fractional seconds are accepted.
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TargetLogListResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AuthEmailPassword:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          example: test@example.com
        password:
          type: string
          example: password123
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
    TokenPair:
      type: object
      required: [access_token, refresh_token]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        message:
          type: string
        fields:
          type: object
          additionalProperties:
            type: string
    User:
      type: object
      required: [id, email, created_at]
      properties:
        id:
          type: string
          format: uuid
        user_tg:
          type: string
          nullable: true
        email:
          type: string
        created_at:
          type: string
          format: date-time
    AlertChannel:
      type: object
      required: [id, user_id, type, address, enabled, created_at]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        type:
          type: string
          enum: [telegram, webhook]
        address:
          type: string
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
    CreateAlertChannelRequest:
      type: object
      required: [type, address]
      properties:
        type:
          type: string
          enum: [telegram, webhook]
        address:
          type: string
        enabled:
          type: boolean
          default: true
    UpdateAlertChannelRequest:
      type: object
      properties:
        type:
          type: string
          enum: [telegram, webhook]
        address:
          type: string
        enabled:
          type: boolean
    TelegramLinkTokenResponse:
      type: object
      required: [link_url, expires_at]
      properties:
        link_url:
          type: string
          format: uri
        expires_at:
          type: string
          format: date-time
    TargetStatus:
      type: string
      enum: [unknown, up, down]
    Target:
      type: object
      required: [id, url, name, interval, enabled, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        name:
          type: string
        interval:
          type: integer
          description: Check interval in seconds.
        enabled:
          type: boolean
        status:
          $ref: "#/components/schemas/TargetStatus"
        last_checked_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
    CreateTargetRequest:
      type: object
      required: [url, interval]
      properties:
        url:
          type: string
          format: uri
        interval:
          type: integer
          minimum: 30
          maximum: 3600
          description: Check interval in seconds.
        enabled:
          type: boolean
          default: true
        name:
          type: string
    UpdateTargetRequest:
      type: object
      properties:
        url:
          type: string
          format: uri
        interval:
          type: integer
          minimum: 30
          maximum: 3600
          description: Check interval in seconds.
        enabled:
          type: boolean
        name:
          type: string
    TargetListResponse:
      type: object
      required: [items, page, page_size, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Target"
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
    TargetLog:
      type: object
      required: [id, status_code, response_time_ms, success, error_message, checked_at]
      properties:
        id:
          type: string
          format: uuid
        status_code:
          type: integer
        response_time_ms:
          type: integer
        success:
          type: boolean
        error_message:
          type: string
        checked_at:
          type: string
          format: date-time
    TargetLogListResponse:
      type: object
      required: [items, page, page_size, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/TargetLog"
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
