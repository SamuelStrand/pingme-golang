openapi: 3.0.3
info:
  title: PingMe API
  version: 0.1.0
servers:
  - url: http://localhost:8080

tags:
  - name: auth
  - name: user
  - name: alert-channels
  - name: health

paths:
  /health:
    get:
      tags: [health]
      summary: Liveness probe
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  db: { type: string }

  /ready:
    get:
      tags: [health]
      summary: Readiness probe
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }

  /auth/register:
    post:
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthEmailPassword"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "409":
          description: Email already exists

  /auth/login:
    post:
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthEmailPassword"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "401":
          description: Invalid credentials

  /auth/refresh:
    post:
      tags: [auth]
      summary: Refresh tokens (rotation)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "401":
          description: Invalid refresh token

  /auth/logout:
    post:
      tags: [auth]
      summary: Logout (revoke refresh session)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "204":
          description: No Content

  /me:
    get:
      tags: [user]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /alert-channels:
    get:
      tags: [alert-channels]
      summary: List current user's alert channels
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AlertChannel"
        "401":
          description: Unauthorized
    post:
      tags: [alert-channels]
      summary: Create alert channel
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAlertChannelRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertChannel"
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "409":
          description: Already exists

  /alert-channels/{id}:
    patch:
      tags: [alert-channels]
      summary: Update alert channel
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAlertChannelRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertChannel"
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "404":
          description: Not found
        "409":
          description: Already exists
    delete:
      tags: [alert-channels]
      summary: Delete alert channel
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
        "404":
          description: Not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AuthEmailPassword:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          example: test@example.com
        password:
          type: string
          example: password123
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
    TokenPair:
      type: object
      required: [access_token, refresh_token]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
    User:
      type: object
      required: [id, email, created_at]
      properties:
        id:
          type: string
          format: uuid
        user_tg:
          type: string
          nullable: true
        email:
          type: string
        created_at:
          type: string
          format: date-time
    AlertChannel:
      type: object
      required: [id, user_id, type, address, enabled, created_at]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        type:
          type: string
          enum: [telegram, webhook]
        address:
          type: string
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
    CreateAlertChannelRequest:
      type: object
      required: [type, address]
      properties:
        type:
          type: string
          enum: [telegram, webhook]
        address:
          type: string
        enabled:
          type: boolean
          default: true
    UpdateAlertChannelRequest:
      type: object
      properties:
        type:
          type: string
          enum: [telegram, webhook]
        address:
          type: string
        enabled:
          type: boolean
